name: OSS Guardrails

# Enforces the open-core boundary for this PUBLIC repo: no commercial/private
# Lumvale code or dependencies may enter it. See the org's
# Engineering/Architecture/oss-and-ip-isolation.md.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  boundary:
    name: Open-core boundary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: No private/commercial Lumvale deps or imports
        run: node .github/scripts/check-oss-boundary.mjs
      - name: Root LICENSE present
        run: |
          test -f LICENSE || { echo "::error::A root LICENSE file is required for this OSS repo"; exit 1; }

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Use the gitleaks CLI (MIT, free) directly — the gitleaks-action wrapper
      # requires a paid license for org-owned repos.
      - name: gitleaks (CLI)
        run: |
          VER=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar -xzf gl.tgz gitleaks
          ./gitleaks detect --no-git --config .gitleaks.toml --redact --exit-code 1 --source .

  licenses:
    name: Dependency licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Reports all dependency licenses and warns on strong copyleft (GPL/AGPL/SSPL).
      # Report-only for now; flip the warning to a hard failure once the baseline is
      # reviewed. See Engineering/Architecture/license-and-legal-compliance.md.
      - name: License scan (block on strong copyleft)
        run: |
          npx --yes license-checker-rseidelsohn --production --summary | tee licenses.txt
          if grep -Eiq 'AGPL|(^|[^L])GPL-|SSPL' licenses.txt; then
            echo "::error::Strong-copyleft dependency detected — disallowed (see license-and-legal-compliance.md)."
            exit 1
          fi
          echo "No strong-copyleft dependencies detected."
