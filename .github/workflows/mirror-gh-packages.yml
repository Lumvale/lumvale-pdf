name: Mirror engine to GitHub Packages

# Publishes @lumvale/pdf-core and @lumvale/pdf-browser to the org's GitHub
# Packages registry, IN ADDITION to their primary public-npm home. Internal
# commercial consumers (workspace-ui, Omnia) point the whole @lumvale scope at
# GitHub Packages so the private packages (workspace-contracts, workspace-ui,
# storybook) resolve there; the engine must be reachable from the same registry,
# hence this mirror. External OSS users keep using public npm (the default).
#
# Manual trigger — run after a public-npm release of core/browser. Re-running an
# already-mirrored version errors on the duplicate; that's safe to ignore.
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://npm.pkg.github.com"
          scope: "@lumvale"

      - run: npm ci

      - run: npm run build --workspace=core
      - run: npm run build --workspace=browser

      - run: npm publish --workspace=core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm publish --workspace=browser
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
