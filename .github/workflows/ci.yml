name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Use Node.js 20
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'

    # Workspace-aware install from the repo root so the local packages
    # (@lumvale/pdf-core, @lumvale/pdf-browser) link instead of resolving from
    # the registry.
    - name: Install Dependencies
      run: npm install

    # Build in dependency order: core -> browser, since ui's tsc needs the
    # browser package's emitted types.
    - name: Build packages (core, browser)
      run: |
        npm run build --workspace=core
        npm run build --workspace=browser

    - name: Unit tests (core, browser)
      run: |
        npm run test --workspace=core
        npm run test --workspace=browser

    - name: Build UI
      run: npm run build --workspace=ui

    - name: Install Playwright Browsers
      run: cd ui && npx playwright install --with-deps

    - name: Run E2E Tests
      run: cd ui && npx playwright test
