name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests for every workspace (core, browser, ui).
  # ---------------------------------------------------------------------------
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - name: Build packages (core, browser)
        run: |
          npm run build --workspace=core
          npm run build --workspace=browser
      - name: Unit tests (core, browser, ui)
        run: |
          npm run test --workspace=core
          npm run test --workspace=browser
          npm run test --workspace=ui

  # ---------------------------------------------------------------------------
  # Web e2e + computer-vision (functional matrix, visual regression, OCR, PWA).
  # Runs inside the pinned Playwright image so the browsers AND font rendering
  # match the committed Linux visual baselines (tests/__screenshots__/*-linux.png).
  # ---------------------------------------------------------------------------
  e2e-web:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    env:
      # The web suite doesn't need the Electron binary — skip the heavy download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v7
      - name: Install dependencies
        run: npm ci
      - name: Build packages (core, browser)
        run: |
          npm run build --workspace=core
          npm run build --workspace=browser
      - name: Run web e2e + CV suite
        run: npx playwright test
        working-directory: ./ui
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web
          path: |
            ui/playwright-report/
            ui/test-results/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Electron desktop app e2e across all three shipping platforms.
  # ---------------------------------------------------------------------------
  e2e-electron:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build packages (core, browser, ui)
        run: |
          npm run build --workspace=core
          npm run build --workspace=browser
          npm run build --workspace=ui
      # global-setup.ts launches Playwright Chromium to generate PDF fixtures, and
      # on Linux this also pulls the shared libraries Electron itself needs.
      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium
        working-directory: ./ui
      # Electron needs a display on Linux; wrap the run in a virtual framebuffer.
      - name: Electron e2e (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx playwright test -c playwright.electron.config.ts
        working-directory: ./ui
      - name: Electron e2e (macOS / Windows)
        if: runner.os != 'Linux'
        run: npx playwright test -c playwright.electron.config.ts
        working-directory: ./ui
      - name: Upload Electron report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-electron-${{ matrix.os }}
          path: |
            ui/playwright-report/
            ui/test-results/
          retention-days: 14
