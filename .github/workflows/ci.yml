name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: |
        cd core && npm install
        cd ../ui && npm install

    - name: Build Core Engine
      run: cd core && npm run build

    - name: Build UI
      run: cd ui && npm run build

    - name: Install Playwright Browsers
      run: cd ui && npx playwright install --with-deps

    - name: Run E2E Tests
      run: cd ui && npx playwright test
