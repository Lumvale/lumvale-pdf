# Automated dependency updates. See the design-system MAINTENANCE.md for the policy.
#
# Third-party (public npm) + GitHub Actions are monitored out of the box.
# Security updates are opened immediately regardless of the schedule.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
